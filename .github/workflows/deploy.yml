name: Build And Deploy Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Nuxt static output
        env:
          LARAVEL_API_URL: ${{ vars.LARAVEL_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TRYON_SPACE: ${{ vars.HF_TRYON_SPACE }}
          NUXT_HUB: "false"
          NUXT_PUBLIC_BUILD_ID: ${{ github.sha }}
        run: pnpm generate

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package/backend deploy-package/dist

          # Copy Laravel backend code only (exclude env, vendor, node_modules).
          rsync -av \
            --exclude ".git" \
            --exclude "vendor" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude ".env.*" \
            backend/ deploy-package/backend/

          # Copy Nuxt static output.
          # Nuxt 4 `nuxt generate` outputs to `.output/public` by default.
          if [ -d ".output/public" ]; then
            cp -R .output/public/. deploy-package/dist/
          elif [ -d "dist" ]; then
            cp -R dist/. deploy-package/dist/
          else
            echo "Nuxt generate output folder not found (.output/public or dist)."
            ls -la
            ls -la dist || true
            ls -la .output || true
            exit 1
          fi

      - name: Push deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd deploy-package
          git init
          git checkout -b deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy build from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin deploy
